services:
  - type: web
    name: api-oq-agile-athletes
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      # Set in Render dashboard (sync FOOD_VISION_API_KEY with Python service):
      # FOOD_VISION_*, USDA_API_KEY, COHERE_API_KEY, COHERE_MODEL
      # MONGODB_URI, JWT_SECRET, FitnessOnePAT (exercise)
